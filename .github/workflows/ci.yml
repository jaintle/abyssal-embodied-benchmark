name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Web: typecheck + build ─────────────────────────────────────────────────
  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: Build web app
        run: npm run build:web

  # ─── Python: smoke tests ─────────────────────────────────────────────────────
  python:
    name: Python (smoke tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "python/benchmark/requirements.txt"

      - name: Install Python dependencies
        # Lightweight install only — no torch/stable_baselines3 in CI
        run: |
          pip install --upgrade pip
          pip install -r python/benchmark/requirements.txt

      - name: Run smoke tests
        # Exclude test_benchmark_runner (needs SB3) and test_world_gen (slow)
        run: |
          PYTHONPATH=python/benchmark/src python -m pytest \
            python/benchmark/tests/test_imports.py \
            python/benchmark/tests/test_replay_schema.py \
            python/benchmark/tests/test_world_spec_schema.py \
            python/benchmark/tests/test_navigation_env.py \
            python/benchmark/tests/test_replay_export.py \
            -x -q

  # ─── Cross-contract: Python replay → TypeScript schema ──────────────────────
  contract:
    name: Cross-contract test
    runs-on: ubuntu-latest
    needs: [web, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "python/benchmark/requirements.txt"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r python/benchmark/requirements.txt

      - name: Run cross-contract test
        run: bash tools/contract_test.sh
